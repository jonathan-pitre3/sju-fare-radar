name: SJU Fare Radar

on:
  schedule:
    - cron: "0 12 * * *"      # once daily ~08:00 Puerto Rico time (stays in Ignav free tier)
  workflow_dispatch: {}       # manual "Run now" button

permissions:
  contents: write

# Serialized with weekly.yml: both commit data/fares.db (binary, unmergeable),
# so they must never run concurrently.
concurrency:
  group: fare-data-commits
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fare radar
        env:
          AMADEUS_API_KEY: ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
          IGNAV_API_KEY: ${{ secrets.IGNAV_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fare_radar/check_fares.py

      - name: Commit updated price history
        run: |
          git config user.name "fare-radar-bot"
          git config user.email "actions@github.com"
          git add docs/data/history.json data/fares.db
          if ! git diff --cached --quiet; then
            git commit -m "radar: price data $(date -u +'%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase
            git push
          fi
