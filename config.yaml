# SJU Fare Radar — route configuration
# Thresholds seeded from sju-cheap-flight-search-strategy.md benchmarks (2026-07-11).
# alert_below: send WhatsApp/email when a live round-trip fare <= this USD amount.
# The radar also tracks each route's observed floor and alerts on new floors.

settings:
  origin: SJU
  currency: USD
  adults: 1
  trip_length_days: 7        # default RT length sampled
  scan_horizon_days: 120     # how far ahead to look
  samples_per_run: 2         # 32 entries x 2 x 1 run/day = ~1,950 searches/mo (+1 booking-link call per alert).
                             # Ignav's 1,000 free requests are a ONE-TIME credit; after it: $2 per 1,000
                             # successful (HTTP 200) API calls — an API call, not a link click. This config
                             # costs ~$3.65/month. Dials to cut cost: fewer routes, samples_per_run: 1,
                             # every-other-day cron, or route rotation.
  alert_cooldown_hours: 24   # don't repeat identical alerts within this window
  provider: ignav            # ignav (default, free tier) | amadeus (LEGACY - self-service keys die 2026-07-17)
  amadeus_env: production    # only used if provider: amadeus

# Dashboard color-coding: destination airport → region. Routes, legs, and
# builds inherit the color of where they're ultimately headed.
regions:
  latam: [BOG, MDE, CUN, SDQ, LIM, SJO]          # yellow
  europe: [MAD, FCO, LIS, KEF, LHR, FRA, DUB, CDG, MXP, PRG, BUD, WAW]  # cyan
  asia: [NRT, HKG, SIN, ICN, SGN, BKK, TPE, PVG] # violet
  north_america: [BWI, LAX, EWR]                 # green

routes:
  - code: MAD
    label: "Madrid, Spain"
    alert_below: 620          # Run 006: AA $619 Dec 2026
    cheap_months: [2, 9, 10, 11]
  - code: FCO
    label: "Rome, Italy"
    alert_below: 650          # Run 005b: live floor $721; alert on real dip
    cheap_months: [10, 11, 1]
  - code: LIS
    label: "Lisbon, Portugal"
    alert_below: 510          # Run 000: United $502
    cheap_months: [9, 10]
  - code: NRT
    label: "Tokyo, Japan (single ticket)"
    alert_below: 950          # split build ~$899 is the benchmark to beat
    cheap_months: [1, 8]
  - code: BOG
    label: "Bogotá, Colombia"
    alert_below: 200          # Run 002: $181 RT signals
    cheap_months: [1, 4, 5, 9]
  - code: MDE
    label: "Medellín, Colombia"
    alert_below: 250          # Run 002: Avianca $244 RT
    cheap_months: [9]
  - code: CUN
    label: "Cancún, Mexico"
    alert_below: 280          # Run 002: JetBlue $274 RT
    cheap_months: [4]
  - code: SDQ
    label: "Santo Domingo, Dominican Republic"
    alert_below: 130          # short hop; also Arajet's hub (future LatAm builds)
  - code: SJO
    label: "San José, Costa Rica"
    alert_below: 330          # Avianca/Copa via connections; sales dip ~$300
  - code: LIM
    label: "Lima, Peru"
    alert_below: 400          # Run 002: $160 OW floor → ~$350-400 RT target
    cheap_months: [9]
  - code: BWI
    label: "Baltimore, USA"
    alert_below: 160          # Run 000: Frontier $150 RT
    cheap_months: [1, 2]

  # --- Asia expansion (2026-07-13). Targets are provisional "great deal" levels;
  # --- the radar self-calibrates via observed floors after the first scans.
  - code: HKG
    label: "Hong Kong"
    alert_below: 900
  - code: SIN
    label: "Singapore"
    alert_below: 1000
  - code: ICN
    label: "Seoul, South Korea"
    alert_below: 950
  - code: SGN
    label: "Ho Chi Minh City, Vietnam"
    alert_below: 1000
  - code: BKK
    label: "Bangkok, Thailand"
    alert_below: 950
  - code: TPE
    label: "Taipei, Taiwan"
    alert_below: 950
  - code: PVG
    label: "Shanghai, China"
    alert_below: 900

  # --- Europe expansion (2026-07-13)
  - code: KEF
    label: "Reykjavík, Iceland"
    alert_below: 500
  - code: LHR
    label: "London, UK"
    alert_below: 600
  - code: FRA
    label: "Frankfurt, Germany"
    alert_below: 600
  - code: DUB
    label: "Dublin, Ireland"
    alert_below: 550
  - code: CDG
    label: "Paris, France"
    alert_below: 600
  - code: MXP
    label: "Milan, Italy"
    alert_below: 620
  # PRG/BUD/WAW directs removed 2026-07-13: first scans showed ~$890-910 flat,
  # pricier than the Madrid-gateway builds below. Eastern Europe is watched
  # via `builds`.

# Positioning/connecting legs for split builds. `origin:` overrides settings.origin;
# legs with a non-SJU origin are keyed "ORIGIN→CODE" in history and builds.
# Buffer policy (2026-07-13): connecting legs use depart_offset_days: 1 — an
# overnight self-transfer buffer, never a same-day connection on separate
# tickets. Positioning legs use trip_days: 9 (7-day trip + 1 buffer night each
# way). `key:` disambiguates a second entry for the same city pair.
split_legs:
  - code: LAX
    label: "Los Angeles (Zipair positioning, 9-day RT)"
    alert_below: 250
    trip_days: 9
  - code: NRT
    origin: LAX
    label: "LAX → Tokyo (Zipair leg, next-day departure)"
    alert_below: 700
    depart_offset_days: 1
  - code: EWR
    label: "Newark (Air Premia positioning, 9-day RT)"
    alert_below: 300
    trip_days: 9
  - code: ICN
    origin: EWR
    label: "EWR → Seoul (Air Premia leg, next-day departure)"
    alert_below: 800
    depart_offset_days: 1
  - code: MAD
    key: "MAD+"
    label: "Madrid (build positioning, 9-day RT)"
    alert_below: 660
    trip_days: 9
  - code: PRG
    origin: MAD
    label: "Madrid → Prague (LCC hop, next-day departure)"
    alert_below: 120
    depart_offset_days: 1
  - code: BUD
    origin: MAD
    label: "Madrid → Budapest (LCC hop, next-day departure)"
    alert_below: 120
    depart_offset_days: 1
  - code: WAW
    origin: MAD
    label: "Madrid → Warsaw (LCC hop, next-day departure)"
    alert_below: 120
    depart_offset_days: 1

# Split builds: sum of member legs' best fares, tracked and alerted as one price
# and compared against the direct single-ticket route (`versus`).
builds:
  - name: "Tokyo via LAX (Zipair)"
    legs: ["LAX", "LAX→NRT"]
    versus: NRT
    alert_below: 950          # strategy MD Step 5a: ~$899 build is the benchmark
  - name: "Seoul via EWR (Air Premia)"
    legs: ["EWR", "EWR→ICN"]
    versus: ICN
    alert_below: 1000         # Air Premia EWR-ICN ~$900 RT + cheap SJU-EWR positioning
  - name: "Prague via Madrid"
    legs: ["MAD+", "MAD→PRG"]
    alert_below: 750
  - name: "Budapest via Madrid"
    legs: ["MAD+", "MAD→BUD"]
    alert_below: 760
  - name: "Warsaw via Madrid"
    legs: ["MAD+", "MAD→WAW"]
    alert_below: 760
